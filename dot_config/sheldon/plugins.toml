# =============================================================================
# Sheldon Zsh Plugin Manager Configuration
# https://sheldon.cli.rs
# =============================================================================

# 全局配置
shell = "zsh"

# 模板定义
# -----------------------------------------------------------------------------

[templates]
# 标准 source 模板
source = """{% for file in files %}source "{{ file }}"\n{% endfor %}"""

# fpath 模板（用于补全）
fpath = """fpath=( "{{ dir }}" $fpath )"""

# Plugins
# -----------------------------------------------------------------------------

# zsh-completions - 额外补全定义 (Homebrew)
[plugins.zsh-completions]
inline = 'fpath="/opt/homebrew/share/zsh-completions:$fpath"'

# zsh-syntax-highlighting - 语法高亮 (Homebrew)
[plugins.zsh-syntax-highlighting]
inline = 'source "/opt/homebrew/share/zsh-syntax-highlighting/zsh-syntax-highlighting.plugin.zsh"'

# zsh-autosuggestions - 自动建议 (Homebrew)
[plugins.zsh-autosuggestions]
inline = 'source "/opt/homebrew/share/zsh-autosuggestions/zsh-autosuggestions.plugin.zsh"'

# Starship 提示符 (Homebrew)
[plugins.starship]
inline = 'eval "$(starship init zsh)"'

# zoxide 目录跳转 (Homebrew)
[plugins.zoxide]
inline = 'eval "$(zoxide init zsh)"'
