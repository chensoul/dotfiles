# =============================================================================
# Sheldon Zsh Plugin Manager Configuration
# https://sheldon.cli.rs
# =============================================================================

# 全局配置
shell = "zsh"

# 模板定义
# -----------------------------------------------------------------------------

[templates]
# 标准 source 模板
source = """{% for file in files %}source "{{ file }}"\n{% endfor %}"""

# Plugins
# -----------------------------------------------------------------------------

# zsh-completions - 额外补全定义（使用 fpath 模板）
[plugins.zsh-completions]
git = "https://github.com/zsh-users/zsh-completions"
apply = ["fpath"]

# zsh-syntax-highlighting - 语法高亮
[plugins.zsh-syntax-highlighting]
git = "https://github.com/zsh-users/zsh-syntax-highlighting"
apply = ["source"]

# zsh-autosuggestions - 自动建议
[plugins.zsh-autosuggestions]
git = "https://github.com/zsh-users/zsh-autosuggestions"
apply = ["source"]

# Starship 提示符 (Homebrew)
[plugins.starship]
inline = 'eval "$(starship init zsh)"'

# zoxide 目录跳转 (Homebrew)
[plugins.zoxide]
inline = 'eval "$(zoxide init zsh)"'
