# -----------------------------------------------------------------------------
# Sheldon Zsh Plugin Manager Configuration
# https://sheldon.cli.rs
# -----------------------------------------------------------------------------

# 全局配置
shell = "zsh"

# 模板定义
[templates]
source = """{% for file in files %}source "{{ file }}"\n{% endfor %}"""
starship-init = """eval "$(starship init zsh)"\n"""
zoxide-init = """eval "$(zoxide init zsh)"\n"""

# Sourced plugins
# ---------------

[plugins.zsh-autosuggestions]
local = "~/.config/sheldon/plugins/zsh-autosuggestions"
apply = ["source"]

[plugins.zsh-syntax-highlighting]
local = "~/.config/sheldon/plugins/zsh-syntax-highlighting"
apply = ["source"]

# Init plugins (using homebrew-installed binaries)
# ------------------------------------------------
# 注意：这些插件使用本地克隆的 repo 作为 source，但实际通过模板调用 homebrew 安装的版本

[plugins.starship]
local = "~/.config/sheldon/plugins/starship"
apply = ["starship-init"]

[plugins.zoxide]
local = "~/.config/sheldon/plugins/zoxide"
apply = ["zoxide-init"]
