version = "0.8.5"
home = "/Users/zhijunio"
config_dir = "/Users/zhijunio/.config/sheldon"
data_dir = "/Users/zhijunio/.local/share/sheldon"
config_file = "/Users/zhijunio/.config/sheldon/plugins.toml"

[[plugins]]
name = "zsh-completions"
source_dir = "/Users/zhijunio/.local/share/sheldon/repos/github.com/zsh-users/zsh-completions"
files = ["/Users/zhijunio/.local/share/sheldon/repos/github.com/zsh-users/zsh-completions/zsh-completions.plugin.zsh"]
apply = ["fpath"]

[plugins.hooks]

[[plugins]]
name = "zsh-syntax-highlighting"
source_dir = "/Users/zhijunio/.local/share/sheldon/repos/github.com/zsh-users/zsh-syntax-highlighting"
files = ["/Users/zhijunio/.local/share/sheldon/repos/github.com/zsh-users/zsh-syntax-highlighting/zsh-syntax-highlighting.plugin.zsh"]
apply = ["source"]

[plugins.hooks]

[[plugins]]
name = "zsh-autosuggestions"
source_dir = "/Users/zhijunio/.local/share/sheldon/repos/github.com/zsh-users/zsh-autosuggestions"
files = ["/Users/zhijunio/.local/share/sheldon/repos/github.com/zsh-users/zsh-autosuggestions/zsh-autosuggestions.plugin.zsh"]
apply = ["source"]

[plugins.hooks]

[[plugins]]
name = "starship"
raw = 'eval "$(starship init zsh)"'

[[plugins]]
name = "zoxide"
raw = 'eval "$(zoxide init zsh)"'

[templates]
PATH = 'export PATH="{{ dir }}:$PATH"'
path = 'path=( "{{ dir }}" $path )'
fpath = 'fpath=( "{{ dir }}" $fpath )'
source = """
{% for file in files %}source "{{ file }}"
{% endfor %}"""
